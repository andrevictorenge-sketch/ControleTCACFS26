<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Carga Horária - CFS 2026</title>
  <style>
    /* Reset estrutural básico */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
      background-color: #f5f6fa;
    }

    /* 🟢 CONTÊINER DO FUNDO ROTATIVO (Apenas na tela de login) */
    .fundo-rotativo-login {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: background-image 1.8s ease-in-out; /* Transição suave entre as imagens */
    }

    /* 🟢 PELÍCULA PROTETORA CLARA: Suaviza os vetores brancos/dourados das imagens */
    .fundo-rotativo-login::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(255, 255, 255, 0.75); /* Película branca com 75% de opacidade */
    }

    /* Área útil da tela de login */
    .container-autenticacao {
      position: relative;
      z-index: 1; /* Fica acima do fundo animado */
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    /* Cartão de Login Institucional */
    .card-login {
      background-color: #ffffff;
      padding: 35px;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      width: 100%;
      max-width: 350px;
      border-top: 6px solid #8c6239; /* Marrom PMMG */
      text-align: center;
    }

    .login-titulo {
      font-size: 18px;
      font-weight: bold;
      color: #2f3640;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .login-subtitulo {
      font-size: 11px;
      color: #7f8c8d;
      margin-bottom: 25px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .campo-grupo {
      text-align: left;
      margin-bottom: 18px;
    }

    .campo-grupo label {
      font-size: 11px;
      font-weight: bold;
      color: #57606f;
      text-transform: uppercase;
      display: block;
      margin-bottom: 5px;
    }

    .campo-grupo input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ced6e0;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }

    .campo-grupo input:focus {
      border-color: #8c6239;
    }

    .btn-entrar {
      width: 100%;
      background-color: #d35400; /* Laranja operacional */
      color: white;
      border: none;
      padding: 12px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.2s;
      margin-top: 5px;
    }

    .btn-entrar:hover {
      background-color: #e67e22;
    }

    .mensagem-erro {
      color: #c0392b;
      font-size: 12px;
      font-weight: bold;
      margin-top: 15px;
      display: none;
    }

    /* Moldura Oculta do Cronograma (Ocupa a tela cheia após login) */
    #molde-conteudo {
      display: none;
      width: 100%;
      height: 100%;
      border: none;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <div id="fundo-animado" class="fundo-rotativo-login"></div>

  <div id="bloco-login" class="container-autenticacao">
    <div class="card-login">
      <div class="login-titulo">Acesso ao Cronograma</div>
      <div class="login-subtitulo">CFS 2026 - PMMG</div>
      
      <form onsubmit="validarAcesso(event)">
        <div class="campo-grupo">
          <label>Utilizador / ID</label>
          <input type="text" id="usuario" placeholder="Digite seu utilizador" required>
        </div>
        
        <div class="campo-grupo">
          <label>Senha de Acesso</label>
          <input type="password" id="senha" placeholder="Digite sua senha" required>
        </div>
        
        <button type="submit" class="btn-entrar">Autenticar</button>
      </form>

      <div id="erro-autenticacao" class="mensagem-erro">❌ Utilizador ou senha incorretos!</div>
    </div>
  </div>

  <iframe id="molde-conteudo" src=""></iframe>

  <script>
    // 🟢 LINKS CONVERTIDOS DO GOOGLE DRIVE (Direct Stream Autorizado)
    const IMAGENS_PMMG = [
      "https://lh3.googleusercontent.com/d/1zMd8FC4TAgtX9S4gGOBffDt79LiPSSNu", // Imagem 8 (Viatura/Moto/Aeronave)
      "https://lh3.googleusercontent.com/d/1rjcqzfMogqoYt_bBAmht_njL1nQZFpm_", // Imagem 7 (Prédio EFAS/Fachada)
      "https://lh3.googleusercontent.com/d/1E9q11dAOtwpbr7NFqCGdbk207mlC97jc", // Imagem 10 (Brasão Histórico/Sigla)
      "https://lh3.googleusercontent.com/d/1Kdlh68akDnC6nVgwDTW_LOScdroItrAJ"  // Imagem 9 (Silhueta de Militares)
    ];

    const TEMPO_ROTACAO = 300000; // 🟢 Intervalo entre transições 5 minutos
    let indiceAtual = 0;
    let temporizadorFundo;
    
    const elementoFundo = document.getElementById("fundo-animado");

    // Motor de transição do plano de fundo
    function rotacionarFundo() {
      elementoFundo.style.backgroundImage = `url('${IMAGENS_PMMG[indiceAtual]}')`;
      indiceAtual = (indiceAtual + 1) % IMAGENS_PMMG.length;
    }

    // Inicializa a primeira imagem imediatamente e liga o relógio interno
    rotacionarFundo();
    temporizadorFundo = setInterval(rotacionarFundo, TEMPO_ROTACAO);

    // Configurações de Segurança de Acesso
    const USUARIO_CORRETO = "cfs2026";
    const SENHA_CORRETA = "pmmg2026";
    const URL_REAL_SCRIPT = "https://script.google.com/macros/s/AKfycbxZF7e4m2LukyicgE2fYqNxYly9Gwuwg3QPyXxFH21MLcSrNObFmrS5wwoSSIKKSG8TtA/exec";

    function validarAcesso(event) {
      event.preventDefault();
      
      const usuarioInserido = document.getElementById("usuario").value.trim();
      const senhaInserida = document.getElementById("senha").value;
      const erroDiv = document.getElementById("erro-autenticacao");

      if (usuarioInserido === USUARIO_CORRETO && senhaInserida === SENHA_CORRETA) {
        erroDiv.style.display = "none";
        
        // 1. Desliga o temporizador de imagens para economizar memória e internet do usuário
        clearInterval(temporizadorFundo);
        
        // 2. Apaga a interface de login e o elemento de fundo da árvore visual
        document.getElementById("bloco-login").style.display = "none";
        elementoFundo.style.display = "none";
        
        // 3. Carrega o frame do cronograma em tela cheia com URL protegida
        const iframe = document.getElementById("molde-conteudo");
        iframe.src = URL_REAL_SCRIPT;
        iframe.style.display = "block";
      } else {
        erroDiv.style.display = "block";
        document.getElementById("senha").value = "";
      }
    }
  </script>

</body>
</html>
