<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Carga Horária - CFS 2026</title>
  <style>
    /* Reset estrutural para garantir que o site ocupe toda a janela */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #f5f6fa;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    /* Contêiner da Tela de Login centralizada */
    .container-autenticacao {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    /* Cartão de Login estilizado com as cores da PMMG */
    .card-login {
      background-color: #ffffff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      width: 100%;
      max-width: 360px;
      border-top: 6px solid #8c6239; /* Marrom institucional do cabeçalho */
      text-align: center;
    }

    .login-titulo {
      font-size: 18px;
      font-weight: bold;
      color: #2f3640;
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    .login-subtitulo {
      font-size: 11px;
      color: #7f8c8d;
      margin-bottom: 25px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .campo-grupo {
      text-align: left;
      margin-bottom: 15px;
    }

    .campo-grupo label {
      font-size: 11px;
      font-weight: bold;
      color: #57606f;
      text-transform: uppercase;
      display: block;
      margin-bottom: 4px;
    }

    .campo-grupo input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ced6e0;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
    }

    .campo-grupo input:focus {
      border-color: #8c6239; /* Borda destaca em marrom ao clicar */
    }

    .btn-entrar {
      width: 100%;
      background-color: #d35400; /* Laranja dos botões de consulta */
      color: white;
      border: none;
      padding: 10px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.2s;
      margin-top: 10px;
    }

    .btn-entrar:hover {
      background-color: #e67e22;
    }

    .mensagem-erro {
      color: #c0392b;
      font-size: 12px;
      font-weight: bold;
      margin-top: 15px;
      display: none; /* Escondido por padrão */
    }

    /* Configuração da Moldura Invisível de Mascaramento */
    #molde-conteudo {
      display: none; /* Fica oculto até a validação da senha */
      width: 100%;
      height: 100%;
      border: none;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <!-- ELEMENTO 1: BLOCO DE LOGIN VISÍVEL INICIALMENTE -->
  <div id="bloco-login" class="container-autenticacao">
    <div class="card-login">
      <div class="login-titulo">Acesso ao Cronograma</div>
      <div class="login-subtitulo">CFS 2026 - PMMG</div>
      
      <form onsubmit="validarAcesso(event)">
        <div class="campo-grupo">
          <label>Utilizador / ID</label>
          <input type="text" id="usuario" placeholder="Digite o seu utilizador" required>
        </div>
        
        <div class="campo-grupo">
          <label>Senha de Acesso</label>
          <input type="password" id="senha" placeholder="Digite a sua senha" required>
        </div>
        
        <button type="submit" class="btn-entrar">Autenticar</button>
      </form>

      <div id="erro-autenticacao" class="mensagem-erro">❌ Utilizador ou senha incorretos!</div>
    </div>
  </div>

  <!-- ELEMENTO 2: MOLDURA DO IFRAME (MASCARADOR DE URL) -->
  <iframe id="molde-conteudo" src=""></iframe>

  <script>
    // PARÂMETROS AJUSTÁVEIS: Definição de credenciais e link estável executável
    const USUARIO_CORRETO = "cfs2026";
    const SENHA_CORRETA = "pmmg2026";
    const URL_REAL_SCRIPT = "https://script.google.com/macros/s/AKfycbxZF7e4m2LukyicgE2fYqNxYly9Gwuwg3QPyXxFH21MLcSrNObFmrS5wwoSSIKKSG8TtA/exec";

    // Mecanismo de validação e troca dinâmica de interface
    function validarAcesso(event) {
      event.preventDefault(); // Impede o envio tradicional do formulário
      
      const usuarioInserido = document.getElementById("usuario").value.trim();
      const senhaInserida = document.getElementById("senha").value;
      const erroDiv = document.getElementById("erro-autenticacao");

      if (usuarioInserido === USUARIO_CORRETO && senhaInserida === SENHA_CORRETA) {
        erroDiv.style.display = "none";
        
        // 1. Oculta completamente o formulário de login da janela
        document.getElementById("bloco-login").style.display = "none";
        
        // 2. Injeta o link real executável dentro da propriedade 'src' da moldura
        const iframe = document.getElementById("molde-conteudo");
        iframe.src = URL_REAL_SCRIPT;
        
        // 3. Exibe o frame ocupando a área total do navegador mantendo a URL original
        iframe.style.display = "block";
      } else {
        // Se as credenciais falharem, exibe alerta e limpa o campo de senha
        erroDiv.style.display = "block";
        document.getElementById("senha").value = "";
      }
    }
  </script>

</body>
</html>
