<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Carga Horária - CFS 2026</title>
  <style>
    /* Reset estrutural básico */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
      background-color: #000000; /* Fundo padrão preto caso a imagem demore a carregar */
    }

    /* CONTÊINER DO FUNDO ROTATIVO */
    .fundo-rotativo-login {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: background-image 1.8s ease-in-out;
    }

    /* 🟢 PELÍCULA PROTETORA AJUSTADA: Mantém a suavidade dos vetores no fundo */
    .fundo-rotativo-login::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(255, 255, 255, 0.10); /* 10% de opacidade para equilibrar o contraste */
    }

    /* Área útil da tela de login */
    .container-autenticacao {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    /* 🟢 MODIFICAÇÃO CIRÚRGICA: CARTÃO DE LOGIN EM TOM ESCURO (QUASE PRETO) */
    .card-login {
      background-color: #53555f; /* Tom escuro grafite/preto fosco militar */
      padding: 35px;
      border-radius: 8px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 350px;
      border-top: 8px solid #9e8c5c; /* Linha de destaque Marrom PMMG */
      text-align: center;
    }

    /* Ajuste de contraste para os textos sobre o fundo escuro */
    .login-titulo {
      font-size: 18px;
      font-weight: bold;
      color: #ffffff; /* Texto Branco */
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .login-subtitulo {
      font-size: 12px;
      color: #e9e6dc; /* Tom claro para não ofuscar */
      margin-bottom: 25px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .campo-grupo {
      text-align: left;
      margin-bottom: 18px;
    }

    .campo-grupo label {
      font-size: 11px;
      font-weight: bold;
      color: #dfe4ea; /* Texto das labels claro */
      text-transform: uppercase;
      display: block;
      margin-bottom: 5px;
    }

    /* Ajuste nos inputs para harmonizar com a caixa preta */
    .campo-grupo input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #4f5664;
      background-color: #2f3542; /* Fundo do input levemente cinza escuro */
      color: #ffffff; /* Texto digitado em branco */
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }

    /* Altera a cor do texto do placeholder (Dica interna do input) */
    .campo-grupo input::placeholder {
      color: #a4b0be;
    }

    .campo-grupo input:focus {
      border-color: #8c6239; /* Destaca em marrom PMMG ao focar */
    }

    .btn-entrar {
      width: 100%;
      background-color: #d35400;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.2s;
      margin-top: 5px;
    }

    .btn-entrar:hover {
      background-color: #cab985;
    }

    .mensagem-erro {
      color: #ff4757; /* Vermelho vivo para contraste no fundo preto */
      font-size: 12px;
      font-weight: bold;
      margin-top: 15px;
      display: none;
    }

    /* Moldura Oculta do Cronograma */
    #molde-conteudo {
      display: none;
      width: 100%;
      height: 100%;
      border: none;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <div id="fundo-animado" class="fundo-rotativo-login"></div>

  <div id="bloco-login" class="container-autenticacao">
    <div class="card-login">
      <div class="login-titulo">Acesso ao Cronograma de Aulas</div>
      <div class="login-subtitulo">CFS 2026 - EFAS</div>
      
      <form onsubmit="validarAcesso(event)">
        <div class="campo-grupo">
          <label>Usuário / Login</label>
          <input type="text" id="usuario" placeholder="Digite seu utilizador" required>
        </div>
        
        <div class="campo-grupo">
          <label>Senha de Acesso</label>
          <input type="password" id="senha" placeholder="Digite sua senha" required>
        </div>
        
        <button type="submit" class="btn-entrar">Autenticar</button>
      </form>

      <div id="erro-autenticacao" class="mensagem-erro">❌ Usuário ou senha incorretos!</div>
    </div>
  </div>

  <iframe id="molde-conteudo" src=""></iframe>

  <script>
    // 🟢 CORREÇÃO CIRÚRGICA: Protocolo HTTPS injetado diretamente nos links
    const IMAGENS_PMMG = [
      "https://lh3.googleusercontent.com/d/1zMd8FC4TAgtX9S4gGOBffDt79LiPSSNu", // Imagem 8
      "https://lh3.googleusercontent.com/d/1rjcqzfMogqoYt_bBAmht_njL1nQZFpm_", // Imagem 7
      "https://lh3.googleusercontent.com/d/1E9q11dAOtwpbr7NFqCGdbk207mlC97jc", // Imagem 10
      "https://lh3.googleusercontent.com/d/1Kdlh68akDnC6nVgwDTW_LOScdroItrAJ"  // Imagem 9
    ];

    const TEMPO_ROTACAO = 300000; // 5 minutos de intervalo entre as trocas de imagens
    let indiceAtual = 0;
    let temporizadorFundo;
    
    const elementoFundo = document.getElementById("fundo-animado");

    function rotacionarFundo() {
      elementoFundo.style.backgroundImage = `url('${IMAGENS_PMMG[indiceAtual]}')`;
      indiceAtual = (indiceAtual + 1) % IMAGENS_PMMG.length;
    }

    rotacionarFundo();
    temporizadorFundo = setInterval(rotacionarFundo, TEMPO_ROTACAO);

    // Credenciais de Acesso e URL do Script
    const USUARIO_CORRETO = "cfs2026";
    const SENHA_CORRETA = "pmmg2026";
    const URL_REAL_SCRIPT = "https://script.google.com/macros/s/AKfycbxZF7e4m2LukyicgE2fYqNxYly9Gwuwg3QPyXxFH21MLcSrNObFmrS5wwoSSIKKSG8TtA/exec";

    function validarAcesso(event) {
      event.preventDefault();
      
      const usuarioInserido = document.getElementById("usuario").value.trim();
      const senhaInserida = document.getElementById("senha").value;
      const erroDiv = document.getElementById("erro-autenticacao");

      if (usuarioInserido === USUARIO_CORRETO && senhaInserida === SENHA_CORRETA) {
        erroDiv.style.display = "none";
        
        clearInterval(temporizadorFundo);
        document.getElementById("bloco-login").style.display = "none";
        elementoFundo.style.display = "none";
        
        const iframe = document.getElementById("molde-conteudo");
        iframe.src = URL_REAL_SCRIPT;
        iframe.style.display = "block";
      } else {
        erroDiv.style.display = "block";
        document.getElementById("senha").value = "";
      }
    }
  </script>

</body>
</html>
